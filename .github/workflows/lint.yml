name: Lint

on:
  pull_request:
  push:
    branches: [main]

env:
  MISE_ENV: ci

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Run linters
        run: mise run lint
