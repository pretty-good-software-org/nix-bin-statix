---
pre-commit:
  parallel: true
  commands:
    actionlint:
      glob: ".github/workflows/*.{yaml,yml}"
      run: mise run lint:actionlint
      fail_text: "actionlint found issues"

    yamllint:
      glob: "**/*.{yaml,yml}"
      run: mise run lint:yamllint
      fail_text: "yamllint found issues"

    markdown-format:
      glob: "**/*.md"
      run: rumdl fmt --check --extend-enable MD029,MD060 --config 'MD060.enabled = true' -- {staged_files}
      fail_text: "rumdl found formatting issues"

    markdown:
      glob: "**/*.md"
      run: rumdl check --deny-config-warnings -- {staged_files}
      fail_text: "rumdl found issues"

    tool-json:
      glob: "tool.json"
      run: mise run lint:tool-json
      fail_text: "invalid tool.json"
