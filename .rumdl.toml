[global]
enable = ["MD001", "MD003", "MD004", "MD005", "MD007", "MD009", "MD010", "MD011", "MD012", "MD013", "MD014", "MD018", "MD019", "MD020", "MD021", "MD023", "MD025", "MD026", "MD027", "MD028", "MD030", "MD035", "MD038", "MD039", "MD040", "MD042", "MD043", "MD044", "MD045", "MD046", "MD047", "MD048", "MD049", "MD050", "MD051", "MD052", "MD053", "MD054", "MD055", "MD056", "MD058", "MD059", "MD071", "MD076"]
fixable = ["MD007", "MD013", "MD029", "MD047", "MD060", "MD071", "MD076"]
line-length = 120
flavor = "gfm"

exclude = ["node_modules/**"]

[MD007]
indent = 2
style = "fixed"

[MD010]
code-blocks = true

[MD013]
line-length = 120
reflow = true
reflow-mode = "default"
length-mode = "visual"
code-blocks = false
tables = false
code-spans = false
headings = false

[MD027]
list-items = true

[MD029]
style = "ordered"

[MD051]
ignore-case = false

[MD060]
enabled = false
style = "aligned"
max-width = 120

[MD076]
style = "consistent"
