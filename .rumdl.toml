[global]
disable = ["MD022", "MD024", "MD029", "MD031", "MD032", "MD033", "MD034", "MD036", "MD037", "MD041", "MD060"]
fixable = ["MD007", "MD013", "MD029", "MD047", "MD060", "MD071", "MD076"]
line-length = 120
flavor = "gfm"

exclude = ["node_modules/**"]

[MD007]
indent = 2
style = "fixed"

[MD010]
code-blocks = true

[MD013]
line-length = 120
reflow = true
reflow-mode = "default"
length-mode = "visual"
code-blocks = false
code-spans = false
headings = false

[MD027]
list-items = true

[MD029]
style = "ordered"

[MD051]
ignore-case = false

[MD060]
enabled = false
style = "aligned"
max-width = 120

[MD076]
style = "consistent"
