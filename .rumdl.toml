[global]
enable = ["MD007", "MD013", "MD029", "MD047", "MD060", "MD071", "MD076"]
line-length = 120
flavor = "gfm"

[MD007]
indent = 2
style = "fixed"

[MD013]
line-length = 120
reflow = true
reflow-mode = "default"
length-mode = "visual"
code-blocks = false
code-spans = false
headings = false

[MD029]
style = "ordered"

[MD060]
enabled = true
style = "aligned"
max-width = 120

[MD076]
style = "consistent"
